name: orbit_app
description: "Project ORBIT - Spatial, physics-driven note-taking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # Game engine & rendering
  flame: ^1.21.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Rich text editor
  flutter_quill: ^11.0.0

  # Auth
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.0

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0
  json_serializable: ^6.9.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
